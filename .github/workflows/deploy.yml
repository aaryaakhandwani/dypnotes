name: Canary Deploy to AWS Elastic Beanstalk

on:
  push:
    branches:
      - main

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v3

    - name: Create Deployment Package
      run: |
        # ZIP the required files, ignoring the git folder and tests
        zip -r deploy.zip . -x "*.git*" ".github/*" "README.md"

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ secrets.AWS_REGION }} # e.g., us-east-1

    - name: Deploy to Elastic Beanstalk
      uses: einaregilsson/beanstalk-deploy@v21
      with:
        aws_access_key: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws_secret_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        application_name: 'dypnotes' # Update this to your Beanstalk App Name
        environment_name: 'dypnotes-env' # Update to your Beanstalk Env Name
        version_label: "app-${{ github.sha }}"
        region: ${{ secrets.AWS_REGION }}
        deployment_package: deploy.zip
        # By configuring your Elastic Beanstalk environment policies to use standard 
        # "Rolling with Additional Batch" or "Immutable" deployments, 
        # AWS automatically acts as a Canary release mechanism.
